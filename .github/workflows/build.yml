name: Build & OTA Trigger

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio
    
    - name: Build firmware
      run: pio run
    
    - name: Check firmware size
      run: ls -lh .pio/build/testing_device/firmware.bin
    
    - name: Create Release & Upload Firmware
      uses: softprops/action-gh-release@v2
      id: release
      with:
        tag_name: v${{ github.run_number }}
        name: Firmware v${{ github.run_number }}
        body: |
          ## Firmware Build #${{ github.run_number }}
          
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}
          
          ### OTA Trigger
          Firmware URL: https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/firmware.bin
        files: .pio/build/testing_device/firmware.bin
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    # ══════════════════════════════════════════════════════════
    # STEP BARU: Kirim MQTT Trigger Otomatis!
    # ══════════════════════════════════════════════════════════
    - name: Install MQTT Client
      run: pip install paho-mqtt
    
    - name: Send MQTT OTA Trigger
      env:
        MQTT_BROKER: mqtt.permataindonesia.com
        MQTT_PORT: 1838
        MQTT_USER: superAdmNyamuk1
        MQTT_PASS: hYqS9+*zDTxYN3bQSTPzistq
        MQTT_TOPIC: ota/test/device
        FIRMWARE_URL: https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/firmware.bin
      run: |
        echo "📤 Sending MQTT OTA trigger..."
        echo "   Broker: $MQTT_BROKER:$MQTT_PORT"
        echo "   Topic: $MQTT_TOPIC"
        echo "   Payload: $FIRMWARE_URL"
        
        python3 -c "
        import paho.mqtt.client as mqtt
        import time
        
        broker = '$MQTT_BROKER'
        port = $MQTT_PORT
        username = '$MQTT_USER'
        password = '$MQTT_PASS'
        topic = '$MQTT_TOPIC'
        payload = '$FIRMWARE_URL'
        
        print(f'Connecting to {broker}:{port}...')
        
        client = mqtt.Client()
        client.username_pw_set(username, password)
        
        # Connect
        client.connect(broker, port, 60)
        time.sleep(1)  # Tunggu koneksi stabil
        
        # Publish
        print(f'Publishing to {topic}...')
        result = client.publish(topic, payload, qos=1)
        result.wait_for_publish()
        
        print(f'✅ MQTT trigger sent!')
        print(f'   Topic: {topic}')
        print(f'   Payload: {payload}')
        
        # Disconnect
        time.sleep(1)
        client.disconnect()
        print('✅ Done!')
        "
