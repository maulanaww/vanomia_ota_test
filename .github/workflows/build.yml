name: Build Firmware

on:
  push:
    branches: [ main ]

# ══════════════════════════════════════════════════════════════
# PERMISSIONS — WAJIB ADA untuk create release
# ══════════════════════════════════════════════════════════════
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio
    
    - name: Build firmware
      run: pio run
    
    - name: Check firmware size
      run: ls -lh .pio/build/testing_device/firmware.bin
    
    # ══════════════════════════════════════════════════════════
    # GANTI ke softprops/action-gh-release (lebih modern & reliable)
    # ══════════════════════════════════════════════════════════
    - name: Create Release & Upload Firmware
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Firmware v${{ github.run_number }}
        body: |
          ## Firmware Build #${{ github.run_number }}
          
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}
          **Built at:** ${{ github.event.head_commit.timestamp }}
          
          ### Flash via OTA
          1. Copy URL firmware di bawah
          2. Kirim via MQTT ke topik: `ota/test/device`
          3. ESP32 akan download & update sendiri
        files: .pio/build/testing_device/firmware.bin
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
